<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda do Barbeiro | Painel Navalha</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h2 { color: #d4af37; text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        .lista { margin-top: 20px; }
        .card { 
            background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 15px;
            border-left: 6px solid #d4af37; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .info b { color: #d4af37; font-size: 1.2em; display: block; margin-bottom: 5px; }
        .info p { margin: 2px 0; font-size: 0.9em; color: #ccc; }
        .data-hora { text-align: right; }
        .hora { font-size: 1.5em; font-weight: bold; color: #d4af37; }
        .data { font-size: 0.8em; color: #888; text-transform: uppercase; }
        select { background: #1a1a1a; color: white; border: 1px solid #d4af37; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Agenda da Semana</h2>
    
    <select id="filtro" onchange="puxarDados()">
        <option value="Todos">Todos os Barbeiros</option>
        <option value="Vinicius">Vinícius</option>
        <option value="Alyson">Alyson</option>
    </select>

    <div id="lista-agendamentos" class="lista">
        <p style="text-align:center">Carregando compromissos...</p>
    </div>
</div>

<script>
    // Suas credenciais do Supabase
    const _URL = 'https://sphqviimkctcwmbrdkaf.supabase.co';
    const _KEY = 'sb_publishable_wSl5pdmhZow-M7plGL16rQ_QLLhSC8e';
    const supabaseClient = supabase.createClient(_URL, _KEY);

    async function puxarDados() {
        const lista = document.getElementById('lista-agendamentos');
        const filtro = document.getElementById('filtro').value;
        
        let query = supabaseClient.from('Clientes').select('*').order('data', { ascending: true }).order('horario', { ascending: true });

        if (filtro !== "Todos") {
            query = query.eq('barbeiro', filtro);
        }

        const { data, error } = await query;

        if (error) {
            lista.innerHTML = "<p>Erro ao carregar os dados.</p>";
            return;
        }

        lista.innerHTML = "";
        if (data.length === 0) {
            lista.innerHTML = "<p style='text-align:center'>Nenhum agendamento encontrado.</p>";
            return;
        }

        data.forEach(item => {
            lista.innerHTML += `
                <div class="card">
                    <div class="info">
                        <b>${item.nome}</b>
                        <p>✂️ Barbeiro: ${item.barbeiro}</p>
                        <p>📱 WhatsApp: ${item.whatsapp}</p>
                    </div>
                    <div class="data-hora">
                        <div class="hora">${item.horario}</div>
                        <div class="data">${item.data}</div>
                    </div>
                </div>
            `;
        });
    }

    puxarDados();
    // Atualiza a cada 30 segundos
    setInterval(puxarDados, 30000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navalha Barber | Luxury Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --glass-bg: rgba(10, 10, 10, 0.85);
            --glass-border: rgba(212, 175, 55, 0.3);
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 80px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 40px; z-index: 10;
        }

        .sidebar i { font-size: 24px; color: rgba(255,255,255,0.3); cursor: pointer; transition: 0.4s; }
        .sidebar i.active { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .sidebar i:hover { color: var(--gold); transform: scale(1.1); }

        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container { 
            max-width: 440px; width: 100%; 
            background: var(--glass-bg); 
            backdrop-filter: blur(25px);
            padding: 45px; border-radius: 40px; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); 
            text-align: center;
        }

        .view-content { display: none; animation: fadeIn 0.8s ease-out; }
        .active-view { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 900; color: var(--gold); text-transform: uppercase; letter-spacing: 8px; margin-bottom: 5px; font-size: 2.2em; }
        .progresso { font-size: 11px; color: var(--gold); text-transform: uppercase; margin-bottom: 30px; letter-spacing: 4px; opacity: 0.8; }

        input { 
            width: 100%; padding: 18px; margin: 12px 0; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); 
            color: #fff; outline: none; box-sizing: border-box; font-size: 16px; text-align: center;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.1); }

        .barbeiros-container { display: flex; justify-content: center; margin: 30px 0; }
        .barbeiro-card { cursor: pointer; transition: 0.4s; position: relative; }
        .foto-circulo { 
            width: 130px; height: 130px; border-radius: 50%; 
            border: 2px solid var(--gold); margin-bottom: 12px; 
            overflow: hidden; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .foto-circulo img { width: 100%; height: 100%; object-fit: cover; }
        
        .barbeiro-card p { font-weight: 700; font-size: 14px; letter-spacing: 2px; color: var(--gold); margin: 0; }

        .agenda-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; }
        .hora-slot { 
            padding: 15px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.3s;
        }
        .hora-slot.ocupado { opacity: 0.15; cursor: not-allowed; text-decoration: line-through; }
        .hora-slot:hover:not(.ocupado) { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .hora-slot.selecionado { background: var(--gold) !important; color: #000 !important; border-color: var(--gold); }

        button { 
            width: 100%; padding: 20px; border-radius: 18px; border: none; 
            background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <i class="fas fa-cut active"></i>
        <i class="fab fa-whatsapp" onclick="window.open('https://api.whatsapp.com/send?phone=5547988277580')" style="color: #25d366;"></i>
    </nav>

    <main class="main-content">
        <div class="container">
            <div id="view-booking" class="view-content active-view">
                <h1>Navalha</h1>
                <p id="label-passo" class="progresso">Identificação</p>
                
                <div id="step1">
                    <input type="text" id="nome" placeholder="SEU NOME">
                    <input type="tel" id="whatsapp" placeholder="SEU WHATSAPP">
                    <button onclick="irParaPasso2()">Próximo</button>
                </div>

                <div id="step2" style="display:none">
                    <input type="text" id="calendario" placeholder="ESCOLHA A DATA">
                    <div class="barbeiros-container">
                        <div class="barbeiro-card">
                            <div class="foto-circulo">
                                <img src="https://images.unsplash.com/photo-1593702275687-f8b402bf1fb5?q=80&w=200&h=200&auto=format&fit=crop">
                            </div>
                            <p>ALYSON</p>
                        </div>
                    </div>
                    <input type="hidden" id="barbeiro" value="Alyson">
                    <button id="btn-carregar" style="display:none" onclick="carregarAgenda()">Ver Horários</button>
                </div>

                <div id="step3" style="display:none">
                    <div id="grid-horarios" class="agenda-grid"></div>
                    <input type="hidden" id="horario-selecionado">
                    <button id="btn-confirmar" style="display:none" onclick="finalizarTudo()">Confirmar Reserva</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _supabaseURL = 'https://sphqviimkctcwmbrdkaf.supabase.co'; 
        const _supabaseKey = 'sb_publishable_wSl5pdmhZow-M7plGL16rQ_QLLhSC8e';
        const supabaseClient = supabase.createClient(_supabaseURL, _supabaseKey);

        const horariosLista = ["09:00", "10:00", "11:00", "14:00", "15:00", "16:00", "17:00", "18:00"];

        flatpickr("#calendario", {
            locale: "pt",
            dateFormat: "d/m/Y",
            minDate: "today",
            disable: [ (date) => (date.getDay() === 0) ], 
            onChange: function() { document.getElementById('btn-carregar').style.display = 'block'; }
        });

        function irParaPasso2() {
            if(document.getElementById('nome').value === "") return alert("Por favor, informe seu nome.");
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('label-passo').innerText = "Data do Atendimento";
        }

        async function carregarAgenda() {
            const grid = document.getElementById('grid-horarios');
            const dataSel = document.getElementById('calendario').value;
            const barbSel = "Alyson";
            
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
            document.getElementById('label-passo').innerText = "Escolha o Horário";

            const { data: ocupados } = await supabaseClient.from('Clientes')
                .select('horario').eq('data', dataSel).eq('barbeiro', barbSel);

            const listOcupados = ocupados ? ocupados.map(o => o.horario) : [];

            grid.innerHTML = "";
            horariosLista.forEach(hora => {
                const div = document.createElement('div');
                div.innerText = hora;
                div.classList.add('hora-slot');
                if (listOcupados.includes(hora)) div.classList.add('ocupado');
                else {
                    div.onclick = () => {
                        document.querySelectorAll('.hora-slot').forEach(h => h.classList.remove('selecionado'));
                        div.classList.add('selecionado');
                        document.getElementById('horario-selecionado').value = hora;
                        document.getElementById('btn-confirmar').style.display = 'block';
                    };
                }
                grid.appendChild(div);
            });
        }

        async function finalizarTudo() {
            const dados = {
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                data: document.getElementById('calendario').value,
                barbeiro: "Alyson",
                horario: document.getElementById('horario-selecionado').value
            };

            const { error } = await supabaseClient.from('Clientes').insert([dados]);

            if (error) {
                alert("Erro ao salvar. Verifique sua conexão.");
            } else {
                alert("Agendamento efetuado!");
                const msg = `✅ *AGENDAMENTO CONFIRMADO*%0A👤 *Cliente:* ${dados.nome}%0A📅 *Data:* ${dados.data}%0A⏰ *Hora:* ${dados.horario}%0A✂️ *Barbeiro:* Alyson`;
                window.open(`https://api.whatsapp.com/send?phone=5547988277580&text=${msg}`, '_blank');
                window.location.reload();
            }
        }
    </script>
</body>
</html>
